    <script>
      AFRAME.registerComponent("prop-fix", {
        init: function () {
          this.el.addEventListener("model-loaded", () => {
            const mesh = this.el.getObject3D("mesh");

            if (!mesh) {
              return;
            }

            this.el.setAttribute("shadow", "cast: false; receive: false");

            mesh.traverse((node) => {
              if (!node.isMesh || !node.material) {
                return;
              }

              node.castShadow = false;
              node.receiveShadow = false;
              node.frustumCulled = false;

              const materials = Array.isArray(node.material) ? node.material : [node.material];

              materials.forEach((material) => {
                material.side = THREE.DoubleSide;
                material.depthWrite = true;
                material.depthTest = true;
                material.dithering = true;
                material.needsUpdate = true;
              });
            });
          });
        }
      });

      AFRAME.registerComponent("mansion-fix", {
        init: function () {
          this.el.addEventListener("model-loaded", () => {
            const mesh = this.el.getObject3D("mesh");

            if (!mesh) {
              return;
            }

            this.el.setAttribute("shadow", "cast: false; receive: false");

            mesh.traverse((node) => {
              if (!node.isMesh || !node.material) {
                return;
              }

              node.castShadow = false;
              node.receiveShadow = false;
              node.frustumCulled = false;

              const materials = Array.isArray(node.material) ? node.material : [node.material];

              materials.forEach((material) => {
                material.side = material.transparent ? THREE.DoubleSide : THREE.FrontSide;
                material.depthWrite = true;
                material.depthTest = true;
                material.polygonOffset = true;
                material.polygonOffsetFactor = 0.15;
                material.polygonOffsetUnits = 0.15;
                material.dithering = true;

                if (material.transparent) {
                  material.depthWrite = false;
                  material.alphaTest = Math.max(material.alphaTest || 0, 0.03);
                }

                if ("normalScale" in material && material.normalScale) {
                  material.normalScale.set(0.6, 0.6);
                }

                material.needsUpdate = true;
              });
            });
          });
        }
      });
    </script>
